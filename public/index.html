<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>download-center</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <h1>下载中心</h1>
  <p>公开下载：点击“下载”将通过 <code>/d/&lt;assetId&gt;</code> 进行 302 跳转至真实地址（S3 或外部直链）。</p>

  <div class="tabs">
    <button class="tab active" id="tab-assets">按资源分类</button>
    <button class="tab" id="tab-devices">按设备型号</button>
  </div>

  <div id="view-assets">
    <div class="row">
      <label>分类</label>
      <select id="asset-category">
        <option value="desktop">桌面端软件（含驱动）</option>
        <option value="mobile">手机端软件</option>
        <option value="docs">文档（PDF）</option>
      </select>

      <label id="asset-platform-label">平台</label>
      <select id="asset-platform"></select>

      <label id="asset-subtype-label">类型</label>
      <select id="asset-subtype"></select>

      <input id="asset-q" placeholder="搜索名称/版本" size="26" />
      <button id="asset-refresh">刷新</button>
    </div>

    <table>
      <thead><tr><th>名称</th><th>版本</th><th>标签</th><th>操作</th></tr></thead>
      <tbody id="asset-tbody"></tbody>
    </table>
  </div>

  <div id="view-devices" style="display:none;">
    <div class="split">
      <div class="card">
        <h3>选择设备</h3>
        <div class="row">
          <label>设备分类</label>
          <select id="device-type"></select>
        </div>
        <div class="row">
          <label>型号</label>
          <select id="device-model"></select>
        </div>
        <div class="row">
          <input id="device-q" placeholder="搜索关联资源" size="22"/>
        </div>
        <div class="small">提示：该视图展示“型号关联资源”，点击下载同样走 302 Redirect。</div>
      </div>

      <div>
        <div class="card">
          <h3 id="device-title">型号资源</h3>
          <table>
            <thead><tr><th>资源</th><th>标签</th><th>操作</th></tr></thead>
            <tbody id="device-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
