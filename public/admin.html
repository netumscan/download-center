<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>下载中心 · 管理</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <h1>下载中心 · 管理</h1>
  <p>通过管理端发布新 catalog 到 D1，并手动刷新 KV。</p>

  <div class="card">
    <h3>鉴权</h3>
    <div class="row">
      <input id="admin-token" type="password" placeholder="Admin Token (Bearer)" size="40" />
      <button id="btn-save-token">保存 Token</button>
      <span id="auth-status" class="small"></span>
    </div>
  </div>

  <div class="card">
    <h3>刷新缓存 / 导出 JSON</h3>
    <div class="row">
      <button id="btn-load">从 D1 读取已发布版本到编辑器</button>
      <button id="btn-refresh">写入 KV（并下载 JSON）</button>
      <button id="btn-get-version">获取当前已发布 version_id</button>
    </div>
    <div id="refresh-result" class="small"></div>
  </div>

  <div class="card">
    <h3>编辑 Catalog 并发布到 D1</h3>
    <div class="row">
      <input id="catalog-label" placeholder="版本标签（可选）" size="28" />
      <button id="btn-import">保存并发布（写入 D1 + KV）</button>
    </div>
    <h4>资源 Assets</h4>
    <div class="row">
      <button id="btn-add-asset">新增资源</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th><th>名称</th><th>分类</th><th>平台/架构</th><th>类型/URL/版本</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="assets-body"></tbody>
    </table>

    <h4>设备 / 型号 / 关联</h4>
    <div class="row">
      <button id="btn-add-device">新增设备</button>
    </div>
    <div id="devices-container"></div>

    <div id="import-result" class="small"></div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
