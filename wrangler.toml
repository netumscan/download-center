name = "download-center"
main = "src/worker.js"
compatibility_date = "2025-12-01"

assets = { directory = "./public", binding = "ASSETS", run_worker_first = ["/api/*", "/d/*", "/admin/*"] }

[[d1_databases]]
binding = "DB"
database_name = "download-center-db"
database_id = "replace-with-your-d1-id"

[[kv_namespaces]]
binding = "CACHE"
id = "replace-with-your-kv-id"
