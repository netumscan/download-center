name = "download-center"
main = "dist/_worker.js"
compatibility_date = "2025-12-01"

# NOTE:
# - Run `npm run build` to generate dist/_worker.js before deploying.
# - Configure bindings below to match your Cloudflare account resources.

[vars]
EXTERNAL_ALLOWLIST = "pan.gzxlscan.cn,cloudflare.mayitek.com,hwfotadown.mayitek.com"

[[d1_databases]]
binding = "DB"
database_name = "download-center-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "download-center-r2"

[[kv_namespaces]]
binding = "KV_CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
